name: Build Packer Image

on:
  workflow_dispatch:
    inputs:
      template_path:
        description: |
          Path to the Packer template directory (relative to repo root).
          Example: templates/kubernetes/control-plane/aws
        required: true
        type: string

permissions:
  contents: read    

env:
  PACKER_LOG: 1     

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Packer Init
        working-directory: ${{ inputs.template_path }}
        run: packer init .

      - name: Packer Validate
        working-directory: ${{ inputs.template_path }}
        run: packer validate .

      - name: Packer Build
        working-directory: ${{ inputs.template_path }}
        run: packer build .
```
